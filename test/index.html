<!DOCTYPE html>
<html>
<head>
 <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
 <title>Теннисный Календарь Pro</title>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
 <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
 <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

 <style>
   body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; padding: 10px; margin: 0; color: #333; -webkit-tap-highlight-color: transparent; }
   .container { max-width: 420px; margin: auto; background: white; padding: 15px; border-radius: 28px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); min-height: 550px; width: 100%; box-sizing: border-box; padding-top: 25px;}
  
   .header { display: flex; flex-wrap: wrap; gap: 8px; justify-content: space-between; align-items: center; margin-bottom: 15px; }
   #monthSelect { font-size: 14px; font-weight: bold; border: 1px solid #e0e4e8; border-radius: 12px; padding: 8px; color: #1a237e; background: #fff; flex: 1; outline: none; }
  
   .btn-view-schedule { background: #e8eaf6; color: #1a237e; border: none; padding: 8px 14px; border-radius: 10px; font-size: 11px; font-weight: bold; cursor: pointer; }
   .btn-reset-top { background: #fff1f1; color: #dc2626; border: none; padding: 8px 14px; border-radius: 10px; font-size: 11px; font-weight: bold; cursor: pointer; }

   /* 1. Сетка календаря (Статичность) */
   .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 15px; width: 100%; box-sizing: border-box; }
   .day-name { text-align: center; font-size: 10px; color: #b0b8c1; font-weight: bold; text-transform: uppercase; }
  
   .date-cell {
     height: 55px; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
     background: #f8fafc; border-radius: 12px; font-size: 13px; cursor: pointer;
     transition: 0.2s; border: 2px solid transparent; position: relative; box-sizing: border-box; overflow: hidden;
   }
   .date-cell.active { border-color: #1a237e; background: #eff2ff; }
   .date-cell.saved { background: #4caf50; color: white; }
   
   /* Индикатор +N */
   .plus-tag { position: absolute; top: 2px; right: 2px; background: #ffd600; color: #000; font-size: 7px; font-weight: 900; padding: 1px 3px; border-radius: 4px; line-height: 1; }
   
   .cell-day-num { font-weight: 700; margin-bottom: 1px; }
   .cell-info-row { font-size: 8px; color: rgba(255,255,255,0.9); white-space: nowrap; overflow: hidden; max-width: 90%; text-overflow: ellipsis; }
   .cell-time-tag { color: #ccff00 !important; font-weight: 900; margin-right: 2px; }

   /* 2. Панель редактора (Система вкладок) */
   .editor-panel { background: #f8fafc; border-radius: 20px; padding: 15px; border: 1px solid #edf2f7; display: none; margin-bottom: 20px; }
   
   .tabs-row { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
   .tab-btn { padding: 6px 12px; border-radius: 10px; border: 1px solid #e2e8f0; background: white; font-size: 11px; font-weight: 800; color: #64748b; white-space: nowrap; cursor: pointer; }
   .tab-btn.active { background: #1a237e; color: white; border-color: #1a237e; }
   .tab-btn.add-new { background: #f0fdf4; color: #16a34a; border: 1px dashed #16a34a; }
   .tab-btn.add-new.active { background: #16a34a; color: white; border-style: solid; }

   .location-row { display: grid; grid-template-columns: 1fr 0.6fr auto; gap: 8px; align-items: flex-end; margin-bottom: 12px; }
   .editor-grid-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; align-items: flex-end; }
   
   .stepper-label { font-size: 8px; color: #8e9aaf; margin-bottom: 4px; text-align: center; font-weight: 800; text-transform: uppercase; }
   .stepper { display: flex; align-items: center; background: white; border-radius: 10px; border: 1px solid #e2e8f0; height: 38px; overflow: hidden; }
   .stepper-btn { width: 26px; height: 100%; border: none; background: #f1f5f9; color: #1a237e; font-size: 16px; font-weight: bold; cursor: pointer; }
   .stepper-input { flex: 1; border: none; text-align: center; font-weight: 800; font-size: 13px; background: transparent; outline: none; width: 40px; }

   .button-group { display: flex; gap: 10px; align-items: stretch; height: 45px; }
   .btn-save { flex: 1; background: #1a237e; color: white; border: none; border-radius: 18px; font-weight: 600; font-size: 16px; cursor: pointer; }
   .btn-delete { background: #fff1f1; color: #dc2626; border: 1px solid #fee2e2; width: 45px; border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

   .total-footer { background: #ffffff; border: 1px solid #f0f4f8; padding: 18px; border-radius: 24px; margin-top: 10px; }
   .total-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; border-top: 1px solid #f1f5f9; padding-top: 15px; }
   .total-item { display: flex; flex-direction: column; align-items: center; }
   .total-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; font-weight: 800; text-align: center; }
   .total-val { font-size: 20px; font-weight: 800; color: #1e293b; }
   .val-highlight { color: #f59e0b; }

   .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
   .modal-content { background: white; width: 92%; max-width: 400px; border-radius: 24px; max-height: 80vh; overflow-y: auto; }
 </style>
</head>
<body onclick="deselect()">

<div class="container" onclick="event.stopPropagation()">
 <h1 style="text-align: center; color: #1a237e; font-size: 16px; margin: 0 0 15px 0; font-weight: 700;">Расписание тренировок Pro</h1>
 
 <div class="header">
   <select id="monthSelect" onchange="initMonth()">
     <option value="0">Январь</option><option value="1">Февраль</option><option value="2">Март</option>
     <option value="3">Апрель</option><option value="4" selected>Май</option><option value="5">Июнь</option>
     <option value="6">Июль</option><option value="7">Август</option><option value="8">Сентябрь</option>
   </select>
   <button class="btn-view-schedule" onclick="showSchedule()">График</button>
   <button class="btn-reset-top" onclick="fullReset()">Сброс</button>
 </div>

 <div class="calendar" id="calendar"></div>

 <div class="editor-panel" id="editorPanel">
   <div class="tabs-row" id="tabsRow"></div>

   <div class="location-row">
     <div style="display: flex; flex-direction: column;">
       <span class="stepper-label">Локация</span>
       <select id="locationSelect" onchange="updateDefaultPrice()" style="height:40px; border-radius:12px; border:1px solid #e2e8f0; padding:0 8px;">
         <option value="дутик грунт">дутик грунт</option>
         <option value="тенн.центр">тенн.центр</option>
         <option value="улица грунт">улица грунт</option>
         <option value="другое">другое...</option>
       </select>
     </div>
     <div class="stepper-container">
       <span class="stepper-label">Цена</span>
       <div class="stepper">
         <button class="stepper-btn" onclick="changeVal('priceInput', -100)">−</button>
         <input type="number" id="priceInput" class="stepper-input" value="2200" readonly>
         <button class="stepper-btn" onclick="changeVal('priceInput', 100)">+</button>
       </div>
     </div>
     <button style="border:none; background:#e2e8f0; width:40px; height:40px; border-radius:12px; font-weight:bold;" onclick="deselect()">▾</button>
   </div>
  
   <div class="editor-grid-row">
     <div class="stepper-container">
       <span class="stepper-label">Часы</span>
       <div class="stepper">
         <button class="stepper-btn" onclick="changeVal('hoursInput', -0.5)">−</button>
         <input type="text" id="hoursInput" class="stepper-input" value="1" readonly>
         <button class="stepper-btn" onclick="changeVal('hoursInput', 0.5)">+</button>
       </div>
     </div>
     <div class="stepper-container">
       <span class="stepper-label">Начало</span>
       <div class="stepper">
         <button class="stepper-btn" onclick="changeTime(-30)">−</button>
         <input type="text" id="timeInput" class="stepper-input" value="19:00" readonly>
         <button class="stepper-btn" onclick="changeTime(30)">+</button>
       </div>
     </div>
     <div class="stepper-container">
       <span class="stepper-label">Гость</span>
       <div class="stepper">
         <button class="stepper-btn" onclick="changeVal('guestInput', -1)">−</button>
         <input type="number" id="guestInput" class="stepper-input" value="0" readonly>
         <button class="stepper-btn" onclick="changeVal('guestInput', 1)">+</button>
       </div>
     </div>
   </div>

   <div class="button-group">
     <button class="btn-save" id="saveBtn" onclick="saveData()">Сохранить</button>
     <button class="btn-delete" id="deleteBtn" onclick="deleteEntry()">✕</button>
   </div>
 </div>

 <div class="total-footer">
   <div style="display:flex; justify-content:center; align-items:center; gap:10px; margin-bottom:15px;">
     <span class="total-label">Игроков:</span>
     <div class="stepper" style="width:100px;">
       <button class="stepper-btn" onclick="changeVal('playerCount', -1)">-</button>
       <input type="number" id="playerCount" class="stepper-input" value="2" readonly>
       <button class="stepper-btn" onclick="changeVal('playerCount', 1)">+</button>
     </div>
   </div>
   <div class="total-grid">
     <div class="total-item"><span class="total-label" id="mainTotalLabel">Весь месяц</span><span class="total-val" id="grandTotal">0 ₽</span></div>
     <div class="total-item"><span class="total-label">Моя доля</span><span class="total-val val-highlight" id="perPlayerTotal">0 ₽</span></div>
   </div>
 </div>
</div>

<div class="modal" id="scheduleModal" onclick="this.style.display='none'">
  <div class="modal-content" onclick="event.stopPropagation()" style="padding:20px;">
    <div id="scheduleList"></div>
  </div>
</div>

<script>
  // Конфиг Firebase (используй свой)
  const firebaseConfig = { databaseURL: "https://tennis-test-3c9e3-default-rtdb.europe-west1.firebasedatabase.app/" };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let selectedDayNum = null;
  let activeEntryIndex = -1; // -1 значит "новая запись"
  let schedule = {}; // { 14: [{time: '10:00', price: 2200, ...}, {...}] }

  function initMonth() { 
    deselect();
    loadFromCloud(); 
  }

  function loadFromCloud() {
    const m = document.getElementById('monthSelect').value;
    db.ref('tennis_v2/' + m).once('value').then(snap => {
      const data = snap.val() || {};
      schedule = data.schedule || {};
      document.getElementById('playerCount').value = data.players || 2;
      renderCalendar();
    });
  }

  function saveToCloud() {
    const m = document.getElementById('monthSelect').value;
    db.ref('tennis_v2/' + m).set({
      schedule: schedule,
      players: document.getElementById('playerCount').value
    });
  }

  function renderCalendar() {
    const cal = document.getElementById('calendar'); cal.innerHTML = '';
    ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].forEach(d => cal.innerHTML += `<div class="day-name">${d}</div>`);
    
    const monthIdx = parseInt(document.getElementById('monthSelect').value);
    const firstDay = new Date(2026, monthIdx, 1).getDay();
    let offset = (firstDay === 0) ? 6 : firstDay - 1;
    for(let i=0; i<offset; i++) cal.innerHTML += '<div></div>';

    const daysInMonth = new Date(2026, monthIdx + 1, 0).getDate();
    for(let d=1; d<=daysInMonth; d++) {
      const dayData = schedule[d] || [];
      let classes = ['date-cell'];
      let content = `<span class="cell-day-num">${d}</span>`;
      
      if(dayData.length > 0) {
        classes.push('saved');
        const first = dayData.sort((a,b) => a.time.localeCompare(b.time))[0];
        content += `<div class="cell-info-row"><span class="cell-time-tag">${first.time}</span> ${first.location.substring(0,3)}</div>`;
        if(dayData.length > 1) content += `<div class="plus-tag">+${dayData.length-1}</div>`;
      }
      if(d === selectedDayNum) classes.push('active');
      
      cal.innerHTML += `<div class="${classes.join(' ')}" onclick="selectDay(${d})">${content}</div>`;
    }
    updateTotal();
  }

  function selectDay(day) {
    selectedDayNum = day;
    const dayData = schedule[day] || [];
    activeEntryIndex = dayData.length > 0 ? 0 : -1;
    renderEditor();
    renderCalendar();
  }

  function renderEditor() {
    document.getElementById('editorPanel').style.display = 'block';
    const tabs = document.getElementById('tabsRow');
    tabs.innerHTML = '';
    
    const dayData = schedule[selectedDayNum] || [];
    
    // Вкладки существующих тренировок
    dayData.forEach((entry, idx) => {
      const btn = document.createElement('div');
      btn.className = `tab-btn ${idx === activeEntryIndex ? 'active' : ''}`;
      btn.innerText = entry.time;
      btn.onclick = () => { activeEntryIndex = idx; renderEditor(); };
      tabs.appendChild(btn);
    });

    // Кнопка "+ Еще"
    const addBtn = document.createElement('div');
    addBtn.className = `tab-btn add-new ${activeEntryIndex === -1 ? 'active' : ''}`;
    addBtn.innerText = '+ Еще';
    addBtn.onclick = () => { activeEntryIndex = -1; renderEditor(); };
    tabs.appendChild(addBtn);

    // Заполнение полей
    if(activeEntryIndex !== -1) {
      const e = dayData[activeEntryIndex];
      document.getElementById('timeInput').value = e.time;
      document.getElementById('priceInput').value = e.price;
      document.getElementById('hoursInput').value = e.hours;
      document.getElementById('guestInput').value = e.guests || 0;
      document.getElementById('locationSelect').value = e.location;
      document.getElementById('saveBtn').innerText = "Обновить";
      document.getElementById('deleteBtn').style.display = 'flex';
    } else {
      document.getElementById('timeInput').value = "19:00";
      document.getElementById('guestInput').value = 0;
      document.getElementById('saveBtn').innerText = "Добавить";
      document.getElementById('deleteBtn').style.display = 'none';
    }
  }

  function saveData() {
    const entry = {
      time: document.getElementById('timeInput').value,
      price: parseFloat(document.getElementById('priceInput').value),
      hours: parseFloat(document.getElementById('hoursInput').value),
      location: document.getElementById('locationSelect').value,
      guests: parseInt(document.getElementById('guestInput').value)
    };

    if(!schedule[selectedDayNum]) schedule[selectedDayNum] = [];
    
    if(activeEntryIndex === -1) {
      schedule[selectedDayNum].push(entry);
    } else {
      schedule[selectedDayNum][activeEntryIndex] = entry;
    }

    // 3. Автосортировка по времени
    schedule[selectedDayNum].sort((a,b) => a.time.localeCompare(b.time));
    
    saveToCloud();
    deselect();
  }

  function deleteEntry() {
    if(confirm("Удалить эту тренировку?")) {
      schedule[selectedDayNum].splice(activeEntryIndex, 1);
      if(schedule[selectedDayNum].length === 0) delete schedule[selectedDayNum];
      
      saveToCloud();
      // 3. Умная навигация после удаления
      if(schedule[selectedDayNum]) {
        activeEntryIndex = 0;
        renderEditor();
        renderCalendar();
      } else {
        deselect();
      }
    }
  }

  function updateTotal() {
    let fullTotal = 0;
    let myTotal = 0;
    const basePlayers = parseInt(document.getElementById('playerCount').value) || 2;

    Object.values(schedule).forEach(dayArray => {
      dayArray.forEach(entry => {
        const cost = entry.price * entry.hours;
        fullTotal += cost;
        myTotal += cost / (basePlayers + (entry.guests || 0));
      });
    });

    document.getElementById('grandTotal').innerText = Math.round(fullTotal).toLocaleString() + ' ₽';
    document.getElementById('perPlayerTotal').innerText = Math.round(myTotal).toLocaleString() + ' ₽';
  }

  function deselect() {
    selectedDayNum = null;
    document.getElementById('editorPanel').style.display = 'none';
    renderCalendar();
  }

  function changeTime(step) {
    const input = document.getElementById('timeInput');
    let [h, m] = input.value.split(':').map(Number);
    let total = h * 60 + m + step;
    if (total < 0) total += 1440; if (total >= 1440) total -= 1440;
    input.value = `${Math.floor(total/60).toString().padStart(2,'0')}:${(total%60).toString().padStart(2,'0')}`;
  }

  function changeVal(id, step) {
    const el = document.getElementById(id);
    let v = parseFloat(el.value) + step;
    el.value = (id === 'hoursInput') ? Math.max(0.5, v) : Math.max(0, v);
    if(id === 'playerCount') { saveToCloud(); updateTotal(); }
  }

  function updateDefaultPrice() {
    const prices = { "дутик грунт": 2200, "тенн.центр": 2700, "улица грунт": 1500 };
    const loc = document.getElementById('locationSelect').value;
    if(prices[loc]) document.getElementById('priceInput').value = prices[loc];
  }

  initMonth();
</script>
</body>
</html>
