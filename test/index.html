<!DOCTYPE html>
<html>
<head>
 <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
 <title>Теннисный Календарь Pro</title>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
 <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
 <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

 <style>
   body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; padding: 10px; margin: 0; color: #333; -webkit-tap-highlight-color: transparent; }
   .container { max-width: 420px; margin: auto; background: white; padding: 15px; border-radius: 28px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); min-height: 550px; width: 100%; box-sizing: border-box; padding-top: 25px;}
  
   .header { display: flex; flex-wrap: wrap; gap: 8px; justify-content: space-between; align-items: center; margin-bottom: 15px; }
   #monthSelect { font-size: 14px; font-weight: bold; border: 1px solid #e0e4e8; border-radius: 12px; padding: 8px; color: #1a237e; background: #fff; flex: 1; outline: none; }
  
   .btn-view-schedule { background: #e8eaf6; color: #1a237e; border: none; padding: 8px 14px; border-radius: 10px; font-size: 11px; font-weight: bold; cursor: pointer; }
   .btn-reset-top { background: #fff1f1; color: #dc2626; border: none; padding: 8px 14px; border-radius: 10px; font-size: 11px; font-weight: bold; cursor: pointer; }

   .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 15px; padding: 0; width: 100%; box-sizing: border-box; }
   .day-name { text-align: center; font-size: 10px; color: #b0b8c1; font-weight: bold; text-transform: uppercase; padding-bottom: 2px; }
  
   .date-cell {
     aspect-ratio: 1 / 0.95; width: 95%; margin: auto; min-height: 42px;
     display: flex; flex-direction: column; align-items: center; justify-content: center;
     background: #f8fafc; border-radius: 10px; font-size: 13px; cursor: pointer;
     transition: 0.2s; border: 2px solid transparent; position: relative; box-sizing: border-box; padding: 2px; overflow: hidden;
   }
   .date-cell.active { border-color: #1a237e; background: #eff2ff; }
   .date-cell.saved { background: #4caf50; color: white; box-shadow: 0 4px 10px rgba(76, 175, 80, 0.2); }
   .date-cell.has-guest { border: 2px dashed #ff4444; }
   .date-cell.batch-preview { border-color: #3f51b5; box-shadow: 0 0 8px rgba(63, 81, 181, 0.4); transform: scale(1.02); z-index: 5; }
  
   .cell-day-num { font-weight: 700; margin-bottom: 1px; }
   .cell-info-row { font-size: 8px; margin: 1px 0; color: rgba(255,255,255,0.9); white-space: nowrap; }
   .cell-time-tag { color: #ccff00 !important; font-weight: 900; font-size: 8px; margin-right: 2px; }
   .cell-loc-tag { color: #ffeb3b !important; font-weight: 900; text-transform: lowercase; font-size: 8px; }
   .cell-price { font-size: 8px; font-weight: bold; }
   .plus-tag { position: absolute; top: 2px; right: 2px; background: #ffd600; color: #000; font-size: 7px; font-weight: 900; padding: 1px 3px; border-radius: 4px; line-height: 1; }

   .editor-panel { background: #f8fafc; border-radius: 20px; padding: 15px; border: 1px solid #edf2f7; display: none; margin-bottom: 20px; }
   
   .tabs-row { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
   .tab-btn { padding: 6px 12px; border-radius: 10px; border: 1px solid #e2e8f0; background: white; font-size: 11px; font-weight: 800; color: #64748b; white-space: nowrap; cursor: pointer; }
   .tab-btn.active { background: #1a237e; color: white; border-color: #1a237e; }
   .tab-btn.add-new { background: #f0fdf4; color: #16a34a; border: 1px dashed #16a34a; }
   .tab-btn.add-new.active { background: #16a34a; color: white; border-style: solid; }

   .location-row { display: grid; grid-template-columns: 1fr 0.6fr auto; gap: 8px; align-items: flex-end; margin-bottom: 12px; }
   .editor-grid-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; align-items: flex-end; }
   
   .stepper-container { display: flex; flex-direction: column; }
   .stepper-label { font-size: 8px; color: #8e9aaf; margin-bottom: 4px; text-align: center; font-weight: 800; text-transform: uppercase; white-space: nowrap; }
   
   .stepper { 
     display: flex; align-items: center; background: white; border-radius: 10px; border: 1px solid #e2e8f0; height: 38px; overflow: hidden; 
     box-sizing: border-box;
   }
   .stepper-btn { width: 26px; height: 100%; border: none; background: #f1f5f9; color: #1a237e; font-size: 16px; font-weight: bold; cursor: pointer; padding: 0; }
   
   .stepper-input { 
     flex: 1; border: none; text-align: center !important; font-weight: 800; font-size: 13px; width: 100%; 
     background: transparent; color: #333; outline: none; padding: 0 !important; margin: 0 !important;
     appearance: none; -moz-appearance: textfield; line-height: 38px; display: block;
   }
   .stepper-input::-webkit-outer-spin-button, .stepper-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

   .guest-field .stepper-label { color: #dc2626; }
   .guest-field .stepper { border-color: #ffecb3; background: #fffcf0; }
   .guest-field .stepper-input { color: #dc2626; }

   .button-group { display: flex; gap: 10px; align-items: stretch; height: 45px; }
   .btn-save { flex: 1; background: #1a237e; color: white; border: none; border-radius: 18px; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.2s; }
   .btn-save.update-mode { background: #4caf50; }
   .btn-hide-editor { background: #e2e8f0; color: #1a237e; border: none; width: 45px; height: 40px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
   .btn-delete { background: #fff1f1; color: #dc2626; border: 1px solid #fee2e2; width: 45px; border-radius: 14px; cursor: pointer; font-size: 18px; display: none; align-items: center; justify-content: center; }

   .toggle-container { min-width: 80px; background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 18px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6px 8px; user-select: none; }
   .toggle-container input { display: none; }
   .checkbox-custom { width: 14px; height: 14px; border: 2px solid #cbd5e1; border-radius: 5px; position: relative; background: white; margin-bottom: 2px; }
   .toggle-label { font-size: 8px; font-weight: 800; color: #64748b; text-transform: uppercase; }
   .toggle-container.active { background: #e8eaf6; border-color: #1a237e; }
   .toggle-container.active .checkbox-custom { background: #1a237e; border-color: #1a237e; }

   .total-footer { background: #ffffff; border: 1px solid #f0f4f8; padding: 18px; border-radius: 24px; margin-top: 10px; }
   .total-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; border-top: 1px solid #f1f5f9; padding-top: 15px; }
   .total-item { display: flex; flex-direction: column; align-items: center; }
   .total-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; font-weight: 800; text-align: center; }
   .total-val { font-size: 20px; font-weight: 800; color: #1e293b; }
   .val-highlight { color: #f59e0b; }
   .guest-summary-box { margin-top: 15px; padding: 12px; background: #fffcf0; border-radius: 16px; border: 1px solid #ffecb3; font-size: 12px; line-height: 1.4; }

   .player-row { margin-bottom: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
   .player-row .stepper { width: 140px; margin: 0 auto; display: flex; justify-content: center; }

   .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
   .modal-content { background: white; width: 92%; max-width: 400px; border-radius: 24px; max-height: 80vh; overflow-y: auto; display: flex; flex-direction: column; }
   .modal-header { position: sticky; top: 0; background: white; padding: 15px 20px; z-index: 10; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
   .modal-body { padding: 0 20px; flex: 1; }
   .modal-footer-sticky { position: sticky; bottom: 0; background: white; padding: 15px 20px; border-top: 1px solid #f1f5f9; z-index: 10; }
   .close-modal { font-size: 28px; font-weight: bold; color: #94a3b8; cursor: pointer; }
   .btn-pdf { background: #1a237e; color: white; border: none; width: 100%; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 12px; }
  
   .schedule-item { border-bottom: 1px solid #f1f5f9; padding: 12px 0; line-height: 1.3; }
   .sch-date { font-weight: 800; color: #4caf50; text-transform: lowercase; font-size: 13px; margin-bottom: 2px; }
   .sch-loc { color: #475569; font-size: 12px; }
   .sch-cost-detail { font-size: 14px; font-weight: 900; color: #1a237e; float: right; }
   .sch-guest-money { color: #dc2626; font-weight: 800; margin-top: 4px; font-size: 11px; }
   .sch-saving { color: #64748b; font-size: 10px; font-style: italic; }
 </style>
</head>
<body onclick="deselect()">

<div class="container" onclick="event.stopPropagation()">
<h1 style="text-align: center; color: #1a237e; font-size: 16px; margin: 0 0 15px 0; font-weight: 700; letter-spacing: 0.5px;">
  Расписание тренировок с ТА
</h1>
 <div class="header">
   <select id="monthSelect" onchange="initMonth()">
     <option value="0">Январь 2026</option><option value="1">Февраль 2026</option>
     <option value="2">Март 2026</option><option value="3">Апрель 2026</option>
     <option value="4" selected>Май 2026</option><option value="5">Июнь 2026</option>
     <option value="6">Июль 2026</option><option value="7">Август 2026</option>
     <option value="8">Сентябрь 2026</option><option value="9">Октябрь 2026</option>
     <option value="10">Ноябрь 2026</option><option value="11">Декабрь 2026</option>
   </select>
   <button class="btn-view-schedule" onclick="showSchedule()">График</button>
   <button class="btn-reset-top" onclick="fullReset()">Сброс</button>
 </div>

 <div class="calendar" id="calendar">Загрузка...</div>

 <div class="editor-panel" id="editorPanel">
   <div class="tabs-row" id="tabsRow"></div>

   <div class="location-row">
     <div style="display: flex; flex-direction: column;">
       <span class="stepper-label">Локация</span>
       <select id="locationSelect" onchange="updateDefaultPrice()" style="width:100%; height:40px; border-radius:12px; border:1px solid #e2e8f0; padding:0 10px; outline:none;">
         <option value="дутик грунт">дутик грунт</option>
         <option value="тенн.центр">тенн.центр</option>
         <option value="улица грунт">улица грунт</option>
         <option value="дутик хард">дутик хард</option>
         <option value="другое">другое (ввести...)</option>
       </select>
       <input type="text" id="customLocation" placeholder="Назовите локацию" style="display:none; width:100%; height:36px; border-radius:10px; border:1px solid #e2e8f0; padding:0 10px; box-sizing: border-box; outline:none; text-align:center; margin-top: 4px;">
     </div>
     <div class="stepper-container">
       <span class="stepper-label">Цена</span>
       <div class="stepper">
         <button class="stepper-btn" onclick="changeVal('priceInput', -100)">−</button>
         <input type="number" id="priceInput" class="stepper-input" value="2200" readonly>
         <button class="stepper-btn" onclick="changeVal('priceInput', 100)">+</button>
       </div>
     </div>
     <button class="btn-hide-editor" onclick="deselect()">▾</button>
   </div>
  
   <div class="editor-grid-row">
     <div class="stepper-container">
       <span class="stepper-label">Часы</span>
       <div class="stepper">
         <button class="stepper-btn" onclick="changeVal('hoursInput', -0.5)">−</button>
         <input type="text" id="hoursInput" class="stepper-input" value="1" readonly>
         <button class="stepper-btn" onclick="changeVal('hoursInput', 0.5)">+</button>
       </div>
     </div>
     <div class="stepper-container">
       <span class="stepper-label">Начало</span>
       <div class="stepper">
         <button class="stepper-btn" onclick="changeTime(-30)">−</button>
         <input type="text" id="timeInput" class="stepper-input" value="19:00" readonly>
         <button class="stepper-btn" onclick="changeTime(30)">+</button>
       </div>
     </div>
     <div class="stepper-container guest-field">
       <span class="stepper-label">Гость</span>
       <div class="stepper">
         <button class="stepper-btn" onclick="changeVal('guestInput', -1)">−</button>
         <input type="number" id="guestInput" class="stepper-input" value="0" readonly>
         <button class="stepper-btn" onclick="changeVal('guestInput', 1)">+</button>
       </div>
     </div>
   </div>

   <div class="button-group">
     <button class="btn-save" id="saveBtn" onclick="saveData()">Сохранить</button>
     <label class="toggle-container" id="batchWrap">
       <input type="checkbox" id="batchCheck" onchange="document.getElementById('batchWrap').classList.toggle('active'); toggleBatchPreview()">
       <div class="checkbox-custom"></div>
       <span class="toggle-label" id="batchLabel">+ Все субб</span>
     </label>
     <button class="btn-delete" id="deleteBtn" onclick="deleteEntry()">✕</button>
   </div>
 </div>

 <div class="total-footer">
   <div class="player-row">
     <span class="total-label" style="display: block; margin-bottom: 6px;">Постоянных игроков</span>
     <div class="stepper">
       <button class="stepper-btn" onclick="changeVal('playerCount', -1);">-</button>
       <input type="number" id="playerCount" class="stepper-input" value="2" readonly>
       <button class="stepper-btn" onclick="changeVal('playerCount', 1);">+</button>
     </div>
   </div>
   <div class="total-grid">
     <div class="total-item"><span class="total-label" id="mainTotalLabel">Весь месяц</span><span class="total-val" id="grandTotal">0 ₽</span></div>
     <div class="total-item"><span class="total-label">Моя доля</span><span class="total-val val-highlight" id="perPlayerTotal">0 ₽</span></div>
   </div>
   <div id="mainGuestSummary" class="guest-summary-box" style="display:none;"></div>
 </div>
</div>

<div class="modal" id="scheduleModal" onclick="closeSchedule()">
 <div class="modal-content" id="pdfContent" onclick="event.stopPropagation()">
   <div class="modal-header">
     <h3 id="modalTitle" style="margin:0; color:#1a237e; font-size: 16px;">График тренировок</h3>
     <span class="close-modal" onclick="closeSchedule()">&times;</span>
   </div>
   <div class="modal-body" id="scheduleList"></div>
   <div class="modal-footer-sticky">
     <div id="summaryBlock"></div>
     <button class="btn-pdf" onclick="exportToPDF()" style="margin-top:10px;">Скачать PDF</button>
   </div>
 </div>
</div>

<script>
 // Firebase Init
 const firebaseConfig = { databaseURL: "https://tennis-test-3c9e3-default-rtdb.europe-west1.firebasedatabase.app/" };
 if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
 const db = firebase.database();

 let selectedDayNum = null;
 let activeEntryIndex = -1; // -1 = новое, 0+ = индекс в массиве дня
 let schedule = {}; // Структура: { dayNum: [ {price, hours, location, time, guests}, ... ] }
 let lastUsedByWeekday = {};
 
 const monthNamesGenitive = ["январе", "феврале", "марте", "апреле", "мае", "июне", "июле", "августе", "сентябре", "октябре", "ноября", "декабре"];
 const monthNamesSchedule = ["января", "февраля", "марта", "апреля", "мая", "июня", "июля", "августа", "сентября", "октября", "ноября", "декабря"];
 const locationPrices = { "дутик грунт": 2200, "тенн.центр": 2700, "улица грунт": 1500, "дутик хард": 2500 };

 function updateDefaultPrice() {
   const loc = document.getElementById('locationSelect').value;
   const customInput = document.getElementById('customLocation');
   if (loc === "другое") { customInput.style.display = 'block'; } 
   else { customInput.style.display = 'none'; if(locationPrices[loc]) document.getElementById('priceInput').value = locationPrices[loc]; }
 }

 function changeTime(step) {
   const input = document.getElementById('timeInput');
   let [h, m] = input.value.split(':').map(Number);
   let total = h * 60 + m + step;
   if (total < 0) total += 1440; if (total >= 1440) total -= 1440;
   input.value = `${Math.floor(total/60).toString().padStart(2,'0')}:${(total%60).toString().padStart(2,'0')}`;
 }

 function getShortLoc(full) {
   if(!full) return ''; const l = full.toLowerCase();
   if (l.includes('дутик грунт')) return 'дг'; if (l.includes('центр')) return 'тц';
   if (l.includes('улица')) return 'уг'; if (l.includes('хард')) return 'дх'; return full.substring(0,3);
 }

 function loadData() {
   const monthIdx = document.getElementById('monthSelect').value;
   db.ref('tennis_v3/' + monthIdx).once('value').then((snapshot) => {
     const data = snapshot.val();
     if (data) {
       schedule = data.schedule || {};
       // Конвертация старого формата (объект) в новый (массив), если нужно
       Object.keys(schedule).forEach(day => {
         if (!Array.isArray(schedule[day])) { schedule[day] = [schedule[day]]; }
       });
       document.getElementById('playerCount').value = data.players || 2;
     } else {
       schedule = {};
       document.getElementById('playerCount').value = 2;
     }
     renderCalendar();
   }).catch(() => renderCalendar());
 }

 function saveDataToStorage() {
   const monthIdx = document.getElementById('monthSelect').value;
   db.ref('tennis_v3/' + monthIdx).set({
     schedule: schedule,
     players: document.getElementById('playerCount').value
   });
 }

 function initMonth() { deselect(); loadData(); }

 function deselect() {
   selectedDayNum = null; activeEntryIndex = -1;
   document.getElementById('editorPanel').style.display = 'none';
   document.querySelectorAll('.date-cell').forEach(c => c.classList.remove('batch-preview'));
   renderCalendar();
 }

 function renderCalendar() {
   const cal = document.getElementById('calendar'); cal.innerHTML = '';
   ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].forEach(d => cal.innerHTML += `<div class="day-name">${d}</div>`);
   const monthIdx = parseInt(document.getElementById('monthSelect').value);
   const firstDay = new Date(2026, monthIdx, 1).getDay();
   let offset = (firstDay === 0) ? 6 : firstDay - 1;
   for(let i=0; i<offset; i++) cal.innerHTML += '<div></div>';
   const daysInMonth = new Date(2026, monthIdx + 1, 0).getDate();

   for(let d=1; d<=daysInMonth; d++) {
     let classes = ['date-cell']; let details = ''; let hasGuest = false;
     if(schedule[d] && schedule[d].length > 0) {
       classes.push('saved');
       const dayData = schedule[d].sort((a,b) => a.time.localeCompare(b.time));
       const first = dayData[0];
       const totalCost = dayData.reduce((sum, item) => sum + (item.price * item.hours), 0);
       hasGuest = dayData.some(item => item.guests > 0);
       if(hasGuest) classes.push('has-guest');
       
       let loc = getShortLoc(first.location);
       let plusTag = dayData.length > 1 ? `<div class="plus-tag">+${dayData.length-1}</div>` : '';
       details = `${plusTag}<div class="cell-info-row"><span class="cell-time-tag">${first.time}</span><span class="cell-loc-tag">${loc}</span></div><div class="cell-price">${Math.round(totalCost)}</div>`;
     }
     if(d === selectedDayNum) classes.push('active');
     cal.innerHTML += `<div class="${classes.join(' ')}" onclick="event.stopPropagation(); selectDay(${d})"><span class="cell-day-num">${d}</span>${details}</div>`;
   }
   updateTotal();
 }

 function selectDay(day) {
   selectedDayNum = day;
   const dayData = schedule[day] || [];
   activeEntryIndex = dayData.length > 0 ? 0 : -1;
   renderEditor();
   renderCalendar();
 }

 function renderEditor() {
   const monthIdx = parseInt(document.getElementById('monthSelect').value);
   const dateObj = new Date(2026, monthIdx, selectedDayNum);
   const weekday = dateObj.getDay();
   const dayShort = dateObj.toLocaleDateString('ru-RU', {weekday:'short'});

   document.getElementById('editorPanel').style.display = 'block';
   document.getElementById('batchLabel').innerText = `+ Все ${dayShort}`;
   document.getElementById('batchCheck').checked = false;
   document.getElementById('batchWrap').classList.remove('active');

   // Рендер вкладок
   const tabs = document.getElementById('tabsRow');
   tabs.innerHTML = '';
   const dayData = schedule[selectedDayNum] || [];
   
   dayData.forEach((entry, idx) => {
     const btn = document.createElement('div');
     btn.className = `tab-btn ${idx === activeEntryIndex ? 'active' : ''}`;
     btn.innerText = entry.time;
     btn.onclick = (e) => { e.stopPropagation(); activeEntryIndex = idx; renderEditor(); };
     tabs.appendChild(btn);
   });

   const addBtn = document.createElement('div');
   addBtn.className = `tab-btn add-new ${activeEntryIndex === -1 ? 'active' : ''}`;
   addBtn.innerText = '+ Еще';
   addBtn.onclick = (e) => { e.stopPropagation(); activeEntryIndex = -1; renderEditor(); };
   tabs.appendChild(addBtn);

   const saveBtn = document.getElementById('saveBtn');
   const delBtn = document.getElementById('deleteBtn');

   if(activeEntryIndex !== -1) {
     const e = dayData[activeEntryIndex];
     document.getElementById('priceInput').value = e.price;
     document.getElementById('hoursInput').value = e.hours;
     document.getElementById('timeInput').value = e.time;
     document.getElementById('guestInput').value = e.guests || 0;
     if(locationPrices[e.location]) { 
       document.getElementById('locationSelect').value = e.location; 
       document.getElementById('customLocation').style.display = 'none'; 
     } else { 
       document.getElementById('locationSelect').value = 'другое'; 
       document.getElementById('customLocation').value = e.location; 
       document.getElementById('customLocation').style.display = 'block'; 
     }
     saveBtn.innerText = "Обновить"; saveBtn.classList.add('update-mode');
     document.getElementById('batchWrap').style.display = 'none';
     delBtn.style.display = 'flex';
   } else {
     saveBtn.innerText = "Сохранить"; saveBtn.classList.remove('update-mode');
     document.getElementById('batchWrap').style.display = 'flex';
     delBtn.style.display = 'none';
     
     if(lastUsedByWeekday[weekday]) {
       const last = lastUsedByWeekday[weekday];
       document.getElementById('priceInput').value = last.price;
       document.getElementById('hoursInput').value = last.hours;
       document.getElementById('timeInput').value = last.time;
       document.getElementById('locationSelect').value = locationPrices[last.location] ? last.location : 'другое';
     } else {
       document.getElementById('timeInput').value = "19:00";
       document.getElementById('guestInput').value = 0;
     }
   }
 }

 function saveData() {
   const price = parseFloat(document.getElementById('priceInput').value);
   const hours = parseFloat(document.getElementById('hoursInput').value);
   const time = document.getElementById('timeInput').value;
   const locSel = document.getElementById('locationSelect').value;
   const location = locSel === 'другое' ? (document.getElementById('customLocation').value || 'другое') : locSel;
   const guests = parseInt(document.getElementById('guestInput').value) || 0;
   
   const entry = { price, hours, location, time, guests };
   const monthIdx = parseInt(document.getElementById('monthSelect').value);
   const targetWeekday = new Date(2026, monthIdx, selectedDayNum).getDay();
   lastUsedByWeekday[targetWeekday] = { price, hours, location, time };

   if(!schedule[selectedDayNum]) schedule[selectedDayNum] = [];

   if(document.getElementById('batchCheck').checked) {
     const daysInMonth = new Date(2026, monthIdx + 1, 0).getDate();
     for(let d=1; d<=daysInMonth; d++) {
       if(new Date(2026, monthIdx, d).getDay() === targetWeekday) {
         if(!schedule[d]) schedule[d] = [];
         const existsIdx = schedule[d].findIndex(e => e.time === time);
         if(existsIdx > -1) schedule[d][existsIdx] = {...entry, guests: (d===selectedDayNum ? guests : schedule[d][existsIdx].guests)};
         else schedule[d].push({...entry, guests: (d===selectedDayNum ? guests : 0)});
         schedule[d].sort((a,b) => a.time.localeCompare(b.time));
       }
     }
   } else {
     if(activeEntryIndex === -1) schedule[selectedDayNum].push(entry);
     else schedule[selectedDayNum][activeEntryIndex] = entry;
     schedule[selectedDayNum].sort((a,b) => a.time.localeCompare(b.time));
   }
   saveDataToStorage(); deselect();
 }

 function deleteEntry() {
   if(confirm("Удалить тренировку?")) {
     schedule[selectedDayNum].splice(activeEntryIndex, 1);
     if(schedule[selectedDayNum].length === 0) delete schedule[selectedDayNum];
     saveDataToStorage(); deselect();
   }
 }

 function toggleBatchPreview() {
   const isChecked = document.getElementById('batchCheck').checked;
   document.querySelectorAll('.date-cell').forEach(c => c.classList.remove('batch-preview'));
   if (isChecked && selectedDayNum) {
     const monthIdx = parseInt(document.getElementById('monthSelect').value);
     const targetWeekday = new Date(2026, monthIdx, selectedDayNum).getDay();
     document.querySelectorAll('.date-cell').forEach(cell => {
       const dayNumEl = cell.querySelector('.cell-day-num');
       if (dayNumEl) {
         const d = parseInt(dayNumEl.innerText);
         if (new Date(2026, monthIdx, d).getDay() === targetWeekday && d !== selectedDayNum) cell.classList.add('batch-preview');
       }
     });
   }
 }

 function updateTotal() {
   let myTotal = 0, fullTotal = 0, totalGuestIncome = 0, totalSessions = 0;
   const basePlayers = parseInt(document.getElementById('playerCount').value) || 1;
   
   Object.values(schedule).forEach(dayArray => {
     dayArray.forEach(item => {
       totalSessions++;
       const cost = item.price * item.hours; fullTotal += cost;
       const share = cost / (basePlayers + (item.guests || 0)); myTotal += share;
       if(item.guests > 0) totalGuestIncome += (share * item.guests);
     });
   });

   const monthIdx = parseInt(document.getElementById('monthSelect').value);
   document.getElementById('mainTotalLabel').innerText = `В ${monthNamesGenitive[monthIdx]} за ${totalSessions} тр.`;
   document.getElementById('grandTotal').innerText = Math.round(fullTotal).toLocaleString() + ' ₽';
   document.getElementById('perPlayerTotal').innerText = Math.round(myTotal).toLocaleString() + ' ₽';
   
   const guestBox = document.getElementById('mainGuestSummary');
   let dailyInfo = '';

   // Добавляем расчет экономии за ВЫБРАННЫЙ день
   if (selectedDayNum && schedule[selectedDayNum]) {
     let dailySaving = 0;
     schedule[selectedDayNum].forEach(item => {
       if(item.guests > 0) {
         const dShare = (item.price * item.hours) / (basePlayers + item.guests);
         dailySaving += (dShare * item.guests) / basePlayers;
       }
     });
     if(dailySaving > 0) {
       dailyInfo = `<div style="margin-top:8px; padding-top:8px; border-top:1px dashed #ffecb3; color:#b45309; text-align:center;">✨ Экономия за сегодня: <b>+${Math.round(dailySaving).toLocaleString()} ₽</b></div>`;
     }
   }

   if(totalGuestIncome > 0 || dailyInfo !== '') {
     guestBox.style.display = 'block';
     let monthlyInfo = totalGuestIncome > 0 ? 
       `<div style="text-align:center;">💰 <b>Гости принесли (мес): ${Math.round(totalGuestIncome).toLocaleString()} ₽</b><br><span style="color:#64748b; font-size:11px;">Экономия каждого: по ${Math.round(totalGuestIncome/basePlayers).toLocaleString()} ₽</span></div>` : '';
     guestBox.innerHTML = monthlyInfo + dailyInfo;
   } else { guestBox.style.display = 'none'; }
 }

 function changeVal(id, step) {
   const el = document.getElementById(id); let val = parseFloat(el.value) + step;
   if(id === 'playerCount') { el.value = Math.max(1, val); updateTotal(); saveDataToStorage(); }
   else if(id === 'guestInput') el.value = Math.max(0, val);
   else el.value = (id === 'hoursInput') ? Math.max(0.5, val) : Math.max(0, val);
 }

 function showSchedule() {
   const list = document.getElementById('scheduleList'); list.innerHTML = '';
   const monthIdx = parseInt(document.getElementById('monthSelect').value);
   const basePlayers = parseInt(document.getElementById('playerCount').value) || 1;
   const sortedDays = Object.keys(schedule).sort((a,b)=>a-b);
   
   document.getElementById('modalTitle').innerText = `График тренировок в ${monthNamesGenitive[monthIdx]}`;
   
   let myTotal = 0, fullCost = 0, count = 0;
   sortedDays.forEach(d => {
     schedule[d].forEach(item => {
       count++;
       const date = new Date(2026, monthIdx, d);
       const dayName = date.toLocaleDateString('ru-RU', {weekday:'long'});
       const cost = item.hours * item.price; 
       const share = cost / (basePlayers + item.guests);
       myTotal += share; fullCost += cost;

       let gInfo = item.guests > 0 ? `<div class="sch-guest-money">👤 Гости: +${item.guests} (С гостя: ${Math.round(share)} ₽)</div><div class="sch-saving">экономия напарникам: по ${Math.round((share*item.guests)/basePlayers)} ₽</div>` : '';
       
       list.innerHTML += `
         <div class="schedule-item">
           <div class="sch-date">${d} ${monthNamesSchedule[monthIdx]}, ${dayName} — ${item.time}</div>
           <div class="sch-loc">
             <span class="sch-cost-detail">${Math.round(cost).toLocaleString()} ₽</span>
             ${item.location} • ${item.price}₽/ч • ${item.hours}ч
           </div>
           ${gInfo}
         </div>`;
     });
   });
   
   document.getElementById('summaryBlock').innerHTML = `
     <div style="margin-top: 15px; border-top: 2px solid #f1f5f9; padding-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
       <div style="display: flex; flex-direction: column; align-items: center;">
         <span style="font-size: 10px; color: #94a3b8; text-transform: uppercase; font-weight: 800; text-align: center;">Всего за ${count} тр.</span>
         <span style="font-size: 20px; font-weight: 800; color: #1e293b;">${Math.round(fullCost).toLocaleString()} ₽</span>
       </div>
       <div style="display: flex; flex-direction: column; align-items: center;">
         <span style="font-size: 10px; color: #94a3b8; text-transform: uppercase; font-weight: 800; text-align: center;">Моя доля</span>
         <span style="font-size: 20px; font-weight: 800; color: #f59e0b;">${Math.round(myTotal).toLocaleString()} ₽</span>
       </div>
     </div>`;
   document.getElementById('scheduleModal').style.display = 'flex';
 }

 function exportToPDF() {
   const modalContent = document.getElementById('pdfContent');
   const monthIdx = document.getElementById('monthSelect').value;
   const opt = {
     margin: 10,
     filename: `Tennis_${monthNamesGenitive[monthIdx]}.pdf`,
     image: { type: 'jpeg', quality: 0.98 },
     html2canvas: { scale: 2, useCORS: true },
     jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
   };
   html2pdf().set(opt).from(modalContent).save();
 }
 
 function closeSchedule() { document.getElementById('scheduleModal').style.display = 'none'; }
 function fullReset() { if(confirm("Очистить весь месяц?")) { schedule = {}; saveDataToStorage(); renderCalendar(); } }

 // Init
 initMonth();

</script>
