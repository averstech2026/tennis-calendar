<!DOCTYPE html>
<html>
<head>
 <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
 <title>Теннисный Календарь Pro</title>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
 <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
 <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

 <style>
   body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; padding: 10px; margin: 0; color: #333; -webkit-tap-highlight-color: transparent; }
   .container { max-width: 420px; margin: auto; background: white; padding: 15px; border-radius: 28px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); min-height: 550px; width: 100%; box-sizing: border-box; padding-top: 25px;}
   .header { display: flex; flex-wrap: wrap; gap: 8px; justify-content: space-between; align-items: center; margin-bottom: 15px; }
   #monthSelect { font-size: 14px; font-weight: bold; border: 1px solid #e0e4e8; border-radius: 12px; padding: 8px; color: #1a237e; background: #fff; flex: 1; outline: none; }
   .btn-view-schedule { background: #e8eaf6; color: #1a237e; border: none; padding: 8px 14px; border-radius: 10px; font-size: 11px; font-weight: bold; cursor: pointer; }
   .btn-reset-top { background: #fff1f1; color: #dc2626; border: none; padding: 8px 14px; border-radius: 10px; font-size: 11px; font-weight: bold; cursor: pointer; }

   .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 15px; }
   .day-name { text-align: center; font-size: 10px; color: #b0b8c1; font-weight: bold; text-transform: uppercase; padding-bottom: 2px; }
   .date-cell {
     aspect-ratio: 1 / 0.95; display: flex; flex-direction: column; align-items: center; justify-content: center;
     background: #f8fafc; border-radius: 10px; font-size: 13px; cursor: pointer;
     transition: 0.2s; border: 2px solid transparent; position: relative; box-sizing: border-box;
   }
   .date-cell.active { border-color: #1a237e; background: #eff2ff; }
   .date-cell.saved { background: #1a237e; color: white; }
   .date-cell.has-guest { border: 2px dashed #ef4444; }
   .date-cell.batch-preview { border-color: #1a237e; box-shadow: 0 0 8px rgba(26, 35, 126, 0.4); }
   .cell-day-num { font-weight: 700; }
   .cell-info-row { font-size: 8px; color: rgba(255,255,255,0.9); }
   .plus-tag { position: absolute; top: 2px; right: 2px; background: #ffd600; color: #000; font-size: 7px; font-weight: 900; padding: 1px 3px; border-radius: 4px; }

   .editor-panel { background: #f8fafc; border-radius: 20px; padding: 15px; border: 1px solid #edf2f7; display: none; margin-bottom: 20px; }
   .tabs-row { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; }
   .tab-btn { padding: 6px 12px; border-radius: 10px; border: 1px solid #e2e8f0; background: white; font-size: 11px; font-weight: 800; color: #64748b; cursor: pointer; white-space: nowrap; }
   .tab-btn.active { background: #1a237e; color: white; }
   .tab-btn.add-new { background: #f0fdf4; color: #16a34a; border: 1px dashed #16a34a; }

   .location-row { display: grid; grid-template-columns: 1fr 0.6fr auto; gap: 8px; margin-bottom: 12px; }
   .stepper-container { display: flex; flex-direction: column; }
   .stepper-label { font-size: 8px; color: #8e9aaf; margin-bottom: 4px; text-align: center; font-weight: 800; text-transform: uppercase; }
   .stepper { display: flex; align-items: center; background: white; border-radius: 10px; border: 1px solid #e2e8f0; height: 38px; overflow: hidden; }
   .stepper-btn { width: 26px; height: 100%; border: none; background: #f1f5f9; color: #1a237e; font-weight: bold; cursor: pointer; }
   .stepper-input { flex: 1; border: none; text-align: center; font-weight: 800; font-size: 13px; width: 30px; background: transparent; }

   .button-group { display: flex; gap: 10px; height: 45px; }
   .btn-save { flex: 1; background: #1a237e; color: white; border: none; border-radius: 18px; font-weight: 600; cursor: pointer; }
   .btn-delete { background: #fff1f1; color: #dc2626; border: 1px solid #fee2e2; width: 45px; border-radius: 14px; cursor: pointer; display: none; align-items: center; justify-content: center; }

   .total-footer { background: #ffffff; border: 1px solid #f0f4f8; padding: 18px; border-radius: 24px; margin-top: 10px; }
   .total-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; border-top: 1px solid #f1f5f9; padding-top: 15px; }
   .total-val { font-size: 20px; font-weight: 800; color: #1e293b; }
   .val-highlight { color: #f59e0b; }
   .guest-summary-box { margin-top: 15px; padding: 12px; background: #fffcf0; border-radius: 16px; border: 1px solid #ffecb3; font-size: 12px; }

   .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
   .modal-content { background: white; width: 92%; max-width: 400px; border-radius: 24px; max-height: 85vh; overflow-y: auto; }
   .modal-body { padding: 20px; }
   .schedule-item { border-bottom: 1px solid #f1f5f9; padding: 12px 0; }
 </style>
</head>
<body onclick="deselect()">

<div class="container" onclick="event.stopPropagation()">
 <div class="header">
   <select id="monthSelect" onchange="initMonth()">
     <option value="0">Январь 2026</option><option value="1">Февраль 2026</option>
     <option value="2">Март 2026</option><option value="3">Апрель 2026</option>
     <option value="4" selected>Май 2026</option><option value="5">Июнь 2026</option>
     <option value="6">Июль 2026</option><option value="7">Август 2026</option>
     <option value="8">Сентябрь 2026</option><option value="9">Октябрь 2026</option>
     <option value="10">Ноябрь 2026</option><option value="11">Декабрь 2026</option>
   </select>
   <button class="btn-view-schedule" onclick="showSchedule()">График</button>
   <button class="btn-reset-top" onclick="fullReset()">Сброс</button>
 </div>

 <div class="calendar" id="calendar"></div>

 <div class="editor-panel" id="editorPanel">
   <div class="tabs-row" id="tabsRow"></div>
   <div class="location-row">
     <div style="display: flex; flex-direction: column;">
       <span class="stepper-label">Локация</span>
       <select id="locationSelect" onchange="updatePrice()" style="height:40px; border-radius:12px; border:1px solid #e2e8f0;">
         <option value="дутик грунт">дутик грунт</option>
         <option value="тенн.центр">тенн.центр</option>
         <option value="улица грунт">улица грунт</option>
         <option value="другое">другое...</option>
       </select>
       <input type="text" id="customLocation" placeholder="Название" style="display:none; margin-top:4px; height:30px; border-radius:8px; border:1px solid #e2e8f0;">
     </div>
     <div class="stepper-container">
       <span class="stepper-label">Цена</span>
       <div class="stepper">
         <button class="stepper-btn" onclick="changeVal('priceInput', -100)">−</button>
         <input type="number" id="priceInput" class="stepper-input" value="2200" readonly>
         <button class="stepper-btn" onclick="changeVal('priceInput', 100)">+</button>
       </div>
     </div>
   </div>
   <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px;">
     <div class="stepper-container">
       <span class="stepper-label">Часы</span>
       <div class="stepper">
         <button class="stepper-btn" onclick="changeVal('hoursInput', -0.5)">−</button>
         <input type="text" id="hoursInput" class="stepper-input" value="1" readonly>
         <button class="stepper-btn" onclick="changeVal('hoursInput', 0.5)">+</button>
       </div>
     </div>
     <div class="stepper-container">
       <span class="stepper-label">Начало</span>
       <div class="stepper">
         <button class="stepper-btn" onclick="changeTime(-30)">−</button>
         <input type="text" id="timeInput" class="stepper-input" value="19:00" readonly>
         <button class="stepper-btn" onclick="changeTime(30)">+</button>
       </div>
     </div>
     <div class="stepper-container">
       <span class="stepper-label" style="color:#dc2626">Гость</span>
       <div class="stepper" style="border-color:#ffecb3; background:#fffcf0;">
         <button class="stepper-btn" onclick="changeVal('guestInput', -1)">−</button>
         <input type="number" id="guestInput" class="stepper-input" value="0" readonly>
         <button class="stepper-btn" onclick="changeVal('guestInput', 1)">+</button>
       </div>
     </div>
   </div>
   <div class="button-group">
     <button class="btn-save" onclick="saveData()">Сохранить</button>
     <button class="btn-delete" id="deleteBtn" onclick="deleteEntry()">✕</button>
   </div>
 </div>

 <div class="total-footer">
   <div style="text-align:center; margin-bottom:10px;">
     <span style="font-size:10px; font-weight:800; color:#94a3b8;">ИГРОКОВ: </span>
     <input type="number" id="playerCount" value="2" onchange="updateTotal(); saveDataToStorage();" style="width:40px; text-align:center; border-radius:8px; border:1px solid #e2e8f0; font-weight:800;">
   </div>
   <div class="total-grid">
     <div style="text-align:center;"><span style="font-size:10px; color:#94a3b8;">ВСЕГО</span><br><span class="total-val" id="grandTotal">0 ₽</span></div>
     <div style="text-align:center;"><span style="font-size:10px; color:#94a3b8;">МОЯ ДОЛЯ</span><br><span class="total-val val-highlight" id="perPlayerTotal">0 ₽</span></div>
   </div>
   <div id="mainGuestSummary" class="guest-summary-box" style="display:none;"></div>
 </div>
</div>

<div class="modal" id="scheduleModal" onclick="this.style.display='none'">
 <div class="modal-content" onclick="event.stopPropagation()">
   <div class="modal-body" id="scheduleList"></div>
   <div style="padding:20px; border-top:1px solid #f1f5f9; text-align:center;">
     <button onclick="exportToPDF()" style="background:#1a237e; color:white; border:none; padding:10px 20px; border-radius:10px; font-weight:bold;">PDF</button>
   </div>
 </div>
</div>

<script>
 const firebaseConfig = { databaseURL: "https://tennis-test-3c9e3-default-rtdb.europe-west1.firebasedatabase.app/" };
 if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
 const db = firebase.database();

 let selectedDayNum = null;
 let activeEntryIndex = -1;
 let schedule = {};
 
 const monthNamesGenitive = ["январе", "феврале", "марте", "апреле", "мае", "июне", "июле", "августе", "сентябре", "октябре", "ноябре", "декабре"];

 function updatePrice() {
   const loc = document.getElementById('locationSelect').value;
   const custom = document.getElementById('customLocation');
   custom.style.display = (loc === 'другое') ? 'block' : 'none';
   const prices = {"дутик грунт":2200, "тенн.центр":2700, "улица грунт":1500};
   if(prices[loc]) document.getElementById('priceInput').value = prices[loc];
 }

 function changeTime(step) {
   const input = document.getElementById('timeInput');
   let [h, m] = input.value.split(':').map(Number);
   let total = h * 60 + m + step;
   if (total < 0) total += 1440; if (total >= 1440) total -= 1440;
   input.value = `${Math.floor(total/60).toString().padStart(2,'0')}:${(total%60).toString().padStart(2,'0')}`;
 }

 function loadData() {
   const monthIdx = document.getElementById('monthSelect').value;
   db.ref('tennis_v3/' + monthIdx).once('value').then(s => {
     const data = s.val() || {};
     schedule = data.schedule || {};
     Object.keys(schedule).forEach(d => { if(!Array.isArray(schedule[d])) schedule[d] = [schedule[d]]; });
     document.getElementById('playerCount').value = data.players || 2;
     renderCalendar();
   });
 }

 function saveDataToStorage() {
   const monthIdx = document.getElementById('monthSelect').value;
   db.ref('tennis_v3/' + monthIdx).set({ schedule, players: document.getElementById('playerCount').value });
 }

 function initMonth() { deselect(); loadData(); }

 function deselect() {
   selectedDayNum = null; activeEntryIndex = -1;
   document.getElementById('editorPanel').style.display = 'none';
   renderCalendar();
 }

 function renderCalendar() {
   const cal = document.getElementById('calendar'); cal.innerHTML = '';
   ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].forEach(d => cal.innerHTML += `<div class="day-name">${d}</div>`);
   const monthIdx = parseInt(document.getElementById('monthSelect').value);
   const offset = (new Date(2026, monthIdx, 1).getDay() || 7) - 1;
   for(let i=0; i<offset; i++) cal.innerHTML += '<div></div>';
   
   for(let d=1; d<=new Date(2026, monthIdx+1, 0).getDate(); d++) {
     let classes = ['date-cell']; let details = '';
     if(schedule[d] && schedule[d].length > 0) {
       classes.push('saved');
       if(schedule[d].some(i => i.guests > 0)) classes.push('has-guest');
       if(schedule[d].length > 1) details = `<div class="plus-tag">+${schedule[d].length-1}</div>`;
       details += `<div class="cell-info-row">${schedule[d][0].time}</div>`;
     }
     if(d === selectedDayNum) classes.push('active');
     cal.innerHTML += `<div class="${classes.join(' ')}" onclick="event.stopPropagation(); selectDay(${d})"><span class="cell-day-num">${d}</span>${details}</div>`;
   }
   updateTotal();
 }

 function selectDay(day) {
   selectedDayNum = day;
   activeEntryIndex = (schedule[day] && schedule[day].length > 0) ? 0 : -1;
   renderEditor(); renderCalendar();
 }

 function renderEditor() {
   document.getElementById('editorPanel').style.display = 'block';
   const tabs = document.getElementById('tabsRow'); tabs.innerHTML = '';
   const dayData = schedule[selectedDayNum] || [];
   
   dayData.forEach((e, i) => {
     const b = document.createElement('div');
     b.className = `tab-btn ${i === activeEntryIndex ? 'active' : ''}`;
     b.innerText = e.time;
     b.onclick = (ev) => { ev.stopPropagation(); activeEntryIndex = i; renderEditor(); };
     tabs.appendChild(b);
   });

   const add = document.createElement('div');
   add.className = `tab-btn add-new ${activeEntryIndex === -1 ? 'active' : ''}`;
   add.innerText = '+ Еще';
   add.onclick = (ev) => { ev.stopPropagation(); activeEntryIndex = -1; renderEditor(); };
   tabs.appendChild(add);

   if(activeEntryIndex !== -1) {
     const e = dayData[activeEntryIndex];
     document.getElementById('priceInput').value = e.price;
     document.getElementById('hoursInput').value = e.hours;
     document.getElementById('timeInput').value = e.time;
     document.getElementById('guestInput').value = e.guests || 0;
     document.getElementById('deleteBtn').style.display = 'flex';
   } else {
     document.getElementById('deleteBtn').style.display = 'none';
   }
 }

 function saveData() {
   const entry = {
     price: parseFloat(document.getElementById('priceInput').value),
     hours: parseFloat(document.getElementById('hoursInput').value),
     time: document.getElementById('timeInput').value,
     location: document.getElementById('locationSelect').value === 'другое' ? document.getElementById('customLocation').value : document.getElementById('locationSelect').value,
     guests: parseInt(document.getElementById('guestInput').value) || 0
   };
   if(!schedule[selectedDayNum]) schedule[selectedDayNum] = [];
   if(activeEntryIndex === -1) schedule[selectedDayNum].push(entry);
   else schedule[selectedDayNum][activeEntryIndex] = entry;
   schedule[selectedDayNum].sort((a,b) => a.time.localeCompare(b.time));
   saveDataToStorage(); deselect();
 }

 function deleteEntry() {
   if(confirm("Удалить?")) {
     schedule[selectedDayNum].splice(activeEntryIndex, 1);
     if(schedule[selectedDayNum].length === 0) delete schedule[selectedDayNum];
     saveDataToStorage(); deselect();
   }
 }

 function updateTotal() {
   let myTotal = 0, fullTotal = 0, totalGuestIncome = 0;
   const basePlayers = parseInt(document.getElementById('playerCount').value) || 1;
   
   Object.values(schedule).forEach(dayArr => {
     dayArr.forEach(item => {
       const cost = item.price * item.hours;
       fullTotal += cost;
       const share = cost / (basePlayers + item.guests);
       myTotal += share;
       if(item.guests > 0) totalGuestIncome += (share * item.guests);
     });
   });

   document.getElementById('grandTotal').innerText = Math.round(fullTotal).toLocaleString() + ' ₽';
   document.getElementById('perPlayerTotal').innerText = Math.round(myTotal).toLocaleString() + ' ₽';

   const guestBox = document.getElementById('mainGuestSummary');
   let dailyInfo = '';
   
   if (selectedDayNum && schedule[selectedDayNum]) {
     let dailySaving = 0;
     schedule[selectedDayNum].forEach(item => {
       if(item.guests > 0) {
         const dShare = (item.price * item.hours) / (basePlayers + item.guests);
         dailySaving += (dShare * item.guests) / basePlayers;
       }
     });
     if(dailySaving > 0) {
       dailyInfo = `<div style="margin-top:8px; padding-top:8px; border-top:1px dashed #ffecb3; color:#b45309; text-align:center;">✨ Экономия за сегодня: <b>+${Math.round(dailySaving).toLocaleString()} ₽</b></div>`;
     }
   }

   if(totalGuestIncome > 0 || dailyInfo !== '') {
     guestBox.style.display = 'block';
     let html = totalGuestIncome > 0 ? `<div style="text-align:center;">💰 <b>Гости принесли (мес): ${Math.round(totalGuestIncome).toLocaleString()} ₽</b><br><span style="color:#64748b; font-size:11px;">Экономия каждого: по ${Math.round(totalGuestIncome/basePlayers).toLocaleString()} ₽</span></div>` : '';
     guestBox.innerHTML = html + dailyInfo;
   } else { guestBox.style.display = 'none'; }
 }

 function changeVal(id, step) {
   const el = document.getElementById(id);
   el.value = Math.max((id==='hoursInput'?0.5:0), parseFloat(el.value) + step);
   if(id==='playerCount') updateTotal();
 }

 function showSchedule() {
   const list = document.getElementById('scheduleList'); list.innerHTML = '';
   Object.keys(schedule).sort((a,b)=>a-b).forEach(d => {
     schedule[d].forEach(e => {
       list.innerHTML += `<div class="schedule-item"><b>${d} число - ${e.time}</b><br>${e.location}: ${e.price*e.hours} ₽</div>`;
     });
   });
   document.getElementById('scheduleModal').style.display = 'flex';
 }

 function exportToPDF() {
   const opt = { margin: 10, filename: 'calendar.pdf', jsPDF: { unit: 'mm', format: 'a4' } };
   html2pdf().set(opt).from(document.getElementById('scheduleList')).save();
 }

 function fullReset() { if(confirm("Очистить?")) { schedule = {}; saveDataToStorage(); renderCalendar(); } }

 initMonth();
</script>
</body>
</html>
